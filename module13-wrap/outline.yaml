title: Planning path complete
footer: learn_verification_planning_management — wrap
slides:
- type: title
  title: Planning path complete
  subtitle: You now have a working map of verification planning and management
  notes: 'You now have a working map of verification planning and management: traceability
    from feature to coverage, taxonomy and matrices, bins and closure, risk and replay
    cards, triage and metrics, CI-to-farm flow, sign-off criteria, and VIP handoff.
    Protocol and UVM courses build engines; you learned how to plan, measure, and
    gate them.'
- type: bullets
  title: Skills you can reuse
  bullets:
  - Write plans others can audit
  - Prefer measurable coverage claims over test-name lists
  - Mix test tiers on purpose
  - Close holes with next-test ideas
  - Prioritize by risk and impact
  - File fails with seed, config, and tags
  notes: Write plans others can audit. Prefer measurable coverage claims over test-name
    lists. Mix test tiers on purpose. Close holes with next-test ideas. Prioritize
    by risk and impact. File fails with seed, config, and tags. Bucket nightly noise.
    Track a few honest bars. Promote only through honest stages. Sign off with evidence
    or owned waivers.
- type: two_column
  title: Dual-track recap
  left:
  - If you mainly used browser boards
  - If you mainly wrote docs, revisit any planning lab for graded challenges
  - Either way, keep the vocabulary shared with your team
  right: assets/tools-index.png
  notes: If you mainly used browser boards, take one checklist or matrix into markdown
    for a real block. If you mainly wrote docs, revisit any planning lab for graded
    challenges. Either way, keep the vocabulary shared with your team.
- type: bullets
  title: Where to go next
  bullets:
  - Return to UART, SPI, or I²C to attach plans to protocol work
  - Deepen UVM and pyuvm when you need stronger TB engines
  - Use HDL simulator, Icarus, or Verilator courses when execution fidelity is the
    bottleneck
  - Climb the syllabus ladder for the gap you feel most
  notes: Return to UART, SPI, or I²C to attach plans to protocol work. Deepen UVM
    and pyuvm when you need stronger TB engines. Use HDL simulator, Icarus, or Verilator
    courses when execution fidelity is the bottleneck. Climb the syllabus ladder for
    the gap you feel most.
- type: bullets
  title: Mindset to keep
  bullets:
  - Plans without coverage claims are theater
  - Coverage without closure actions stalls
  - Metrics without triage lie
  - Sign-off without evidence is hope
  - Small, maintained artifacts beat giant unread spreadsheets
  notes: Plans without coverage claims are theater. Coverage without closure actions
    stalls. Metrics without triage lie. Sign-off without evidence is hope. Small,
    maintained artifacts beat giant unread spreadsheets.
- type: bullets
  title: Closing
  bullets:
  - Check off the wrap checklist
  - You finished the verification planning and management path
  - Pick one real project artifact to improve this week
  notes: Check off the wrap checklist. You finished the verification planning and
    management path. Pick one real project artifact to improve this week—a matrix
    row, a run card, or a sign-off line—then continue to the next course that matches
    your goal.
